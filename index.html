<!DOCTYPE html>
<html>
<head>
    <title>Daily Expense Tracker Design</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Daily Expense Tracker</h1>

    <h2>Wireframe Design</h2>

    <div class="wireframe">
        <div class="box title">Application Title</div>

        <div class="box input">Expense Name Input</div>
        <div class="box input">Amount Input</div>
        <div class="box input">Category Input</div>

        <div class="box button">Add Expense Button</div>

        <div class="box table">Expense List / Records</div>
        <div class="box total">Total Expenses Section</div>
    </div>

    <h2>Screen Layout Design</h2>

    <div class="screen">
        <h3>Daily Expense Tracker</h3>

        <input type="text" placeholder="Enter expense name">
        <input type="number" placeholder="Enter amount">
        <select>
            <option>Food</option>
            <option>Transport</option>
            <option>Bills</option>
            <option>Other</option>
        </select>

        <button>Add Expense</button>

        <table>
            <tr>
                <th>Expense</th>
                <th>Amount</th>
                <th>Category</th>
            </tr>
            <tr>
                <td>Lunch</td>
                <td>$1000</td>
                <td>Food</td>
            </tr>
        </table>

        <h3>Total: $1000</h3>
    </div>

</body>
</html>
